services:
  - type: web
    name: cyber-mzazi
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/bootstrap.py && gunicorn --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://your-frontend-domain.example
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: None
      - key: MODEL_ARTIFACT_PATH
        value: /opt/render/project/src/artifacts/message_model.joblib
      - key: MODEL_METRICS_PATH
        value: /opt/render/project/src/artifacts/training_metrics.json
      - key: FORCE_MODEL_RETRAIN
        value: "false"
