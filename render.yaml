services:
  - type: web
    name: cyber-mzazi
    env: python
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: python scripts/bootstrap.py && gunicorn --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://your-frontend-domain.example
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: None
      - key: MODEL_PROVIDER
        value: heuristic
      - key: ENABLE_HEURISTIC_FALLBACK
        value: "true"
      - key: FORCE_MODEL_RETRAIN
        value: "false"
