{% extends "base.html" %}
{% block title %}Parent Login | Cyber Mzazi{% endblock %}
{% block content %}
<section class="hero-card">
  <div>
    <p class="eyebrow">Parent Portal</p>
    <h2>Sign in to the parent dashboard</h2>
    <p class="muted">Review alerts, activity summaries, and safety settings from the parent workspace.</p>
  </div>
  <a class="button ghost" href="{{ url_for('auth.child_login') }}">Child login</a>
</section>

<section class="single-auth-shell">
  <form class="panel auth-panel" method="post">
    <h3>Parent login</h3>
    <label>
      Email or phone
      <input type="text" name="identifier" placeholder="parent@example.com or 0712345678" required>
    </label>
    <label>
      Password
      <input type="password" name="password" required>
    </label>
    <button class="button" type="submit">Open parent dashboard</button>
  </form>
</section>
{% endblock %}
